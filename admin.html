<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员 · 历史考核记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell admin-page">
    <header class="site-header admin-page-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <div>
          <h1>管理员 · 历史考核记录</h1>
          <p class="tagline">筛选、查看与批量导出考核存档</p>
        </div>
      </div>
      <nav class="header-actions">
        <a href="index.html" class="btn btn-ghost">返回考核</a>
        <button type="button" class="btn btn-ghost hidden" id="btn-admin-logout">退出登录</button>
      </nav>
    </header>

    <section class="card" id="admin-login">
      <h2>管理员登录</h2>
      <p class="muted">请输入管理员密码查看历史考核记录。</p>
      <form id="admin-login-form" class="admin-login">
        <label class="field full">
          <span>管理员密码</span>
          <input type="password" id="admin-password" autocomplete="current-password" />
        </label>
        <div class="actions">
          <button type="submit" class="btn btn-primary">进入记录页</button>
        </div>
      </form>
    </section>

    <section class="card hidden" id="admin-panel">
      <div id="admin-panel-body"></div>
    </section>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
